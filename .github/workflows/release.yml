# Build prebuilt `hundegger-btlx` binaries on a tag and attach them to a GitHub
# Release, so factory partners can download and run without a Rust toolchain.
#
# Each OS builds NATIVELY on its own runner (a VM) — no cross-compilation.
# Push a tag to release:  git tag v0.1.0 && git push origin v0.1.0
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: hundegger-btlx-linux-x86_64
            bin: hundegger-btlx
          - os: macos-latest
            asset: hundegger-btlx-macos-arm64
            bin: hundegger-btlx
          - os: windows-latest
            asset: hundegger-btlx-windows-x86_64.exe
            bin: hundegger-btlx.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the channel; rustup installs it automatically.
      - name: Build
        run: cargo build --release --bin hundegger-btlx
      - name: Rename binary
        shell: bash
        run: cp "target/release/${{ matrix.bin }}" "${{ matrix.asset }}"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true
