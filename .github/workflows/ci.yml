# Keep the code honest on every push: build, test, and check formatting.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --all-targets
      - name: Test
        run: cargo test
      - name: Format check
        run: cargo fmt --check
      - name: Inspect a real sample (smoke test the tool)
        run: cargo run --bin hundegger-btlx -- inspect fixtures/samples/lignocam-hackathon.btlx
